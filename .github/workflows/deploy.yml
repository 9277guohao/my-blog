name: 部署到 GitHub Pages

on:
  # 推送 main 分支时自动触发
  push:
    branches: [main]
  # 支持手动触发
  workflow_dispatch:
  # 同步掘金文章工作流结束后触发（用于接住 GITHUB_TOKEN 推送不触发 push 工作流的问题）
  workflow_run:
    workflows: ["同步掘金文章"]
    types: [completed]
    branches: [main]

# 设置 GITHUB_TOKEN 权限，允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务，但不取消正在进行的任务
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 构建 ─────────────────────────────────────────────────────────
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 用于 lastUpdated 功能
          ref: main        # workflow_run 场景下确保拿到同步后的最新 main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: 同步掘金文章
        env:
          JUEJIN_USER_ID: ${{ secrets.JUEJIN_USER_ID }}
        run: |
          node scripts/sync-juejin.mjs || echo "⚠️ 掘金同步失败，使用已有缓存数据继续构建"

      - name: 安装依赖
        run: npm ci

      - name: 构建 VitePress
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # ── 部署 ─────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
